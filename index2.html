<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object-Oriented Grid</title>
    <style>
      canvas {
        border: 1px solid black; /* Optional for better visibility */
      }
    </style>
  </head>
  <body>
    <canvas id="myCanvas" width="900" height="700"></canvas>
    <script>
      const canvas = document.getElementById("myCanvas");
      const ctx = canvas.getContext("2d");

      // Grid properties
      const imageSize = 100;
      const rows = 7;
      const cols = 9;

      // Define the GridItem class
      class GridItem {
        constructor(x, y, imageSrc) {
          this.x = x; // X position of the cell
          this.y = y; // Y position of the cell
          this.image = new Image(); // The image object
          this.image.src = imageSrc; // The source of the image
          this.isHovered = false; // Hover state
        }

        // Draw the grid item
        draw() {
          if (this.isHovered) {
            // Draw a semi-transparent overlay for hover effect
            ctx.fillStyle = "rgba(0, 0, 255, 0.5)";
            ctx.fillRect(this.x, this.y, imageSize, imageSize);
          }
          // Draw the image
          ctx.drawImage(this.image, this.x, this.y, imageSize, imageSize);
        }

        // Check if the mouse is over this cell
        isMouseOver(mouseX, mouseY) {
          return (
            mouseX >= this.x &&
            mouseX < this.x + imageSize &&
            mouseY >= this.y &&
            mouseY < this.y + imageSize
          );
        }
      }

      // Create the grid
      const grid = [];
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          grid.push(
            new GridItem(col * imageSize, row * imageSize, "./images/1.png")
          );
        }
      }

      // Draw the entire grid
      function drawGrid() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear the canvas
        grid.forEach((item) => item.draw()); // Draw each grid item
      }

      // Handle mousemove event
      canvas.addEventListener("mousemove", (event) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;

        // Update hover state for each grid item
        grid.forEach((item) => {
          item.isHovered = item.isMouseOver(mouseX, mouseY);
        });

        // Redraw the grid
        drawGrid();
      });

      // Clear hover effects when the mouse leaves the canvas
      canvas.addEventListener("mouseleave", () => {
        grid.forEach((item) => (item.isHovered = false));
        drawGrid();
      });

      // Draw the initial grid when the first image loads
      grid[0].image.onload = drawGrid;
    </script>
  </body>
</html>
